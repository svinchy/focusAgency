<html background="#000">

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta charset="UTF-8" />
    <style>
      /* ===== FONTS ===== */
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Thin.woff2') format('woff2'),url('./FONT/Exo2-Thin.woff') format('woff'); font-weight:100; font-style:normal; font-display:swap; }

      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Light.woff2') format('woff2'),url('./FONT/Exo2-Light.woff') format('woff'); font-weight:300; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Regular.woff2') format('woff2'),url('./FONT/Exo2-Regular.woff') format('woff'); font-weight:400; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Medium.woff2') format('woff2'),url('./FONT/Exo2-Medium.woff') format('woff'); font-weight:500; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-SemiBold.woff2') format('woff2'),url('./FONT/Exo2-SemiBold.woff') format('woff'); font-weight:600; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Bold.woff2') format('woff2'),url('./FONT/Exo2-Bold.woff') format('woff'); font-weight:700; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-ExtraBold.woff2') format('woff2'); font-weight:800; font-style:normal; font-display:swap; }
      @font-face { font-family:'Exo 2'; src:url('./FONT/Exo2-Black.woff2') format('woff2'),url('./FONT/Exo2-Black.woff') format('woff'); font-weight:900; font-style:normal; font-display:swap; }
      @font-face { font-family:'BPG Square Banner Caps 2013'; src:url('./FONT/bpg-square-banner-caps-2013-webfont.woff2') format('woff2'),url('./FONT/bpg-square-banner-caps-2013-webfont.woff') format('woff'),url('./FONT/bpg-square-banner-caps-2013-webfont.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
      @font-face { font-family:'BPG Square Banner 2013'; src:url('./FONT/bpg-square-banner-2013-webfont.woff2') format('woff2'),url('./FONT/bpg-square-banner-2013-webfont.woff') format('woff'),url('./FONT/bpg-square-banner-2013-webfont.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }

      /* ===== CSS CUSTOM PROPERTIES ===== */
      :root {
        --app-viewport-width: 100vw;
        --app-viewport-height: 100vh;
        --app-visual-viewport-height: 100vh;
        --app-safe-top: env(safe-area-inset-top, 0px);
        --app-safe-right: env(safe-area-inset-right, 0px);
        --app-safe-bottom: env(safe-area-inset-bottom, 0px);
        --app-safe-bottom-stable: env(safe-area-max-inset-bottom, 0px);
        --app-safe-left: env(safe-area-inset-left, 0px);
        --app-fixed-bottom-clearance: max(var(--app-safe-bottom-stable), var(--app-safe-bottom));
        --black: rgba(0,0,0,1);
        --cream: rgba(255,241,227,1);
        --red: rgba(224,77,77,1);
        --radius-s: 0.8em;
        --radius-m: 1.6em;
        --radius-l: 2.6em;
        --ease-io: cubic-bezier(0.4, 0, 0.2, 1);
        --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
        --ease-soft: cubic-bezier(0.25, 0.1, 0.25, 1);
        --dur-fast: 0.2s;
        --dur-med: 0.45s;
        --dur-slow: 0.9s;
        --lh-tight: 0.9em;
        --lh-compact: 1.1em;
        --lh-body: 1.4em;
        --tracking-tight: -0.02em;
        --tracking-wide: 0.06em;
        --font-en: 'Exo 2', sans-serif;
        --font-ka-body: 'BPG Square Banner 2013', sans-serif;
        --font-ka-cap: 'BPG Square Banner Caps 2013', sans-serif;
      }
      @supports (height: 100svh) { :root { --app-viewport-height: 100svh; } }
      @supports (height: 100dvh) { :root { --app-visual-viewport-height: 100dvh; } }

      /* ===== BASE RESET ===== */
      *, *::before, *::after { box-sizing: border-box; }
      [class*="smbls-"]::before, [class*="smbls-"]::after { content: ''; }

      html {
        min-height: 100vh;
        width: 100%;
        max-width: 100%;
        margin: 0;
        overflow-y: scroll;
        overflow-x: hidden;
        scrollbar-gutter: stable;
        box-sizing: border-box;
      }
      html.page-scroll-locked, body.page-scroll-locked {
        overflow: hidden;
        overscroll-behavior: none;
      }
      a[href=""] { pointer-events: none; cursor: default; }

      body {
        position: relative;
        width: 100%;
        min-height: var(--app-viewport-height, 100vh);
        line-height: 1.4em;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-size: 18px;
        margin: 0;
        background: #000;
        color: rgba(255, 241, 227, 1);
        font-family: var(--font-en);
        --corner-final-offset: 20px;
        --corner-left-offset: var(--corner-final-offset);
        --corner-right-offset: var(--corner-final-offset);
        --corner-top-offset: var(--corner-final-offset);
        --corner-bottom-offset: var(--corner-final-offset);
        --logo-final-top-offset: 0.5em;
        --logo-final-left-offset: 0.5em;
      }
      body[data-lang="en"] { font-family: var(--font-en); }
      body[data-lang="ka"] { font-family: var(--font-ka-body); }

      /* ===== ELEMENT POSITIONING ===== */
      body .logo {
        top: calc(2em + var(--app-safe-top, 0px));
        left: calc(2em + var(--app-safe-left, 0px));
        padding-top: 0;
      }

      body .corner,
      body .corner2 {
        --corner-size: 1.2em;
        width: var(--corner-size) !important;
        height: var(--corner-size) !important;
        position: fixed;
        z-index: 5;
        bottom: calc(var(--corner-bottom-offset, var(--corner-final-offset)) + var(--app-fixed-bottom-clearance, 0px));
        left: calc(var(--corner-left-offset, var(--corner-final-offset)) + var(--app-safe-left, 0px));
        transition: opacity 1.6s ease, top 1.2s ease, left 1.2s ease, right 1.2s ease, bottom 1.2s ease, transform 1.2s ease;
      }
      body .corner2 {
        left: initial;
        bottom: initial;
        top: calc(var(--corner-top-offset, var(--corner-final-offset)) + var(--app-safe-top, 0px));
        right: calc(var(--corner-right-offset, var(--corner-final-offset)) + var(--app-safe-right, 0px));
      }

      .menuButton {
        position: fixed !important;
        top: calc(1.5em + var(--app-safe-top, 0px)) !important;
        right: calc(1.5em + var(--app-safe-right, 0px)) !important;
        display: none !important;
        z-index: 140;
      }
      body .navBar {
        position: absolute;
        top: 7em;
        right: 8em;
        z-index: 5;
      }
      .navBar a {
        text-decoration: none !important;
        font-size: 1.1em !important;
        line-height: .8em !important;
        color: var(--cream);
        cursor: pointer;
        font-weight: 400 !important;
        padding: .3em 1em !important;
        opacity: 0.5 !important;
        border-radius: 3em !important;
        background: rgba(224, 77, 77, 0) !important;
        transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), padding 0.5s cubic-bezier(0.4,0,0.2,1), background 0.5s ease, font-weight 0.5s ease, border-radius 0.5s ease, opacity 0.5s ease !important;
      }
      body[data-lang="ka"] .navBar a { font-family: var(--font-ka-cap); font-style: normal; font-weight: 400 !important; text-transform: none; font-synthesis: none; font-size: .9em !important; }
      .navBar a:hover {
        text-transform: capitalize !important;
        opacity: 1 !important;
        background: rgba(224, 77, 77, 1) !important;
        font-weight: 900 !important;
        padding: 1em 1.3em !important;
        transform: scale(1.2);
      }
      body[data-lang="ka"] .navBar a:hover { font-weight: 400 !important; text-transform: none !important; }
      body .langButton {
        position: absolute;
        z-index: 20;
        top: 50vh;
        transform: translateY(-50%);
        right: 2em;
        transition: transform 0.3s var(--ease-io), opacity 0.22s ease;
      }
      body .chatButton {
        position: fixed;
        z-index: 5;
        bottom: calc(1.2em + var(--app-fixed-bottom-clearance, 0px));
        right: calc(1.2em + var(--app-safe-right, 0px));
        transition: opacity 0.22s ease;
      }

      /* ===== INTRO ANIMATION STATES ===== */
      body.intro-active .corner,
      body.intro-active .corner2 { transition: none !important; }
      body.intro-active .logo {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%);
        z-index: 1600;
        color: transparent;
        transition: none !important;
      }
      body.intro-active .logo::after { animation: logoDotPulse 1s ease-in-out infinite; }
      body.intro-reveal .logo { color: var(--cream); animation: logoPulseStrong 0.9s ease-out 1 both; }
      body.intro-corners-move .logo { animation: logoMove 2.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
      body.intro-corners .corner { transform: translate(-50%, -50%) translate(-2em, 2em); animation: cornerPulseStrongLeft 0.9s ease-out 1 both; }
      body.intro-corners .corner2 { transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg); animation: cornerPulseStrongRight 0.9s ease-out 1 both; }
      body.intro-corners-move .corner { animation: cornerToBottomLeft 3s cubic-bezier(0.16, 1, 0.3, 1) both; }
      body.intro-corners-move .corner2 { animation: cornerToTopRight 3s cubic-bezier(0.16, 1, 0.3, 1) both; }

      body.intro-active:not(.intro-finished) { overflow: hidden !important; }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 1500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s ease;
        background: rgba(0, 0, 0, 1);
      }
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 1500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s ease;
        background: radial-gradient(circle at center, rgba(0,0,0,0.16) 0%, rgba(0,0,0,0.42) 100%);
      }
      body.intro-overlay::before { opacity: 1; }
      body.intro-overlay::after { opacity: 1; }
      body.intro-fade::before { opacity: 0; }
      body.intro-fade::after { opacity: 0; }

      /* ===== CHAT PANEL OPEN ===== */
      body.chat-panel-open .logo { opacity: 0; pointer-events: none; }
      body.chat-panel-open .corner { opacity: 0; pointer-events: none; }
      body.chat-panel-open .corner2 { opacity: 0; pointer-events: none; }
      body.chat-panel-open .langButton { opacity: 0; pointer-events: none; }
      body.chat-panel-open .navBar { opacity: 0; pointer-events: none; }
      body.chat-panel-open .menuButton { opacity: 0; pointer-events: none; }

      /* ===== NAV OPEN ===== */
      body.is-nav-open .langButton { opacity: 0; pointer-events: none; }
      body.is-nav-open .chatButton { opacity: 0; pointer-events: none; }
      body.is-nav-open .corner { opacity: 0; pointer-events: none; }
      body.is-nav-open .corner2 { opacity: 0; pointer-events: none; }
      body.is-nav-open .logo { z-index: 130; mix-blend-mode: normal; }

      /* ===== RESPONSIVE BREAKPOINTS ===== */
      @media (max-width: 1680px) { body { font-size: 16px; } }

      @media (max-width: 1180px), (hover: none) and (pointer: coarse) {
        html { height: auto; min-height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        body { min-height: var(--app-viewport-height, 100%); }
        html.page-scroll-locked, body.page-scroll-locked {
          height: var(--app-viewport-height, 100%);
          min-height: var(--app-viewport-height, 100%);
          -webkit-overflow-scrolling: auto;
        }
        .menuButton { display: flex !important; }
        body .navBar {
          position: fixed;
          top: calc(-1 * var(--app-safe-top, 0px));
          right: calc(-1 * var(--app-safe-right, 0px));
          bottom: calc(-1 * var(--app-fixed-bottom-clearance, 0px));
          left: calc(-1 * var(--app-safe-left, 0px));
          min-width: calc(100vw + var(--app-safe-left, 0px) + var(--app-safe-right, 0px));
          min-height: calc(var(--app-visual-viewport-height, var(--app-viewport-height, 100vh)) + var(--app-safe-top, 0px) + var(--app-fixed-bottom-clearance, 0px));
          display: flex;
          flex-direction: column;
          gap: 1em;
          justify-content: flex-end;
          align-items: flex-end;
          padding: calc(7.5em + var(--app-safe-top, 0px)) calc(4em + var(--app-safe-right, 0px)) calc(4em + var(--app-fixed-bottom-clearance, 0px)) calc(4em + var(--app-safe-left, 0px));
          background: linear-gradient(180deg, rgba(8,5,8,0.98) 0%, rgba(8,5,8,1) 100%);
          backdrop-filter: blur(10px);
          z-index: 120;
          transform: translateX(105%);
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
          transition: transform 0.38s var(--ease-io), opacity 0.28s ease, backdrop-filter 0.28s ease, background 0.28s ease;
        }
        body .navBar.is-open {
          transform: translateX(0);
          opacity: 1;
          visibility: visible;
          pointer-events: auto;
          background: linear-gradient(180deg, rgba(8,5,8,0.98) 0%, rgba(8,5,8,1) 100%);
          backdrop-filter: blur(16px);
        }
        body .navBar a {
          width: fit-content;
          font-size: 5em;
          line-height: 1em;
          font-weight: 900;
          border-radius: 0;
          padding: 0;
          opacity: 0;
          transform: translateX(0.7em);
          filter: blur(3px);
          transition: transform 0.42s var(--ease-io), opacity 0.32s ease, filter 0.32s ease;
        }
        body[data-lang="ka"] .navBar a { font-size: 3.5em; font-weight: 400; }
        body .navBar.is-open a { opacity: 0.95; transform: translateX(0); filter: blur(0); }
        body .navBar.is-open a:nth-child(1) { transition-delay: 0.08s; }
        body .navBar.is-open a:nth-child(2) { transition-delay: 0.14s; }
        body .navBar.is-open a:nth-child(3) { transition-delay: 0.2s; }
        body .navBar a:hover { text-transform: none; opacity: 1; background: rgba(224,77,77,0); font-weight: 700; padding: 0; transform: translateX(-0.08em); }
        body .langButton { right: 0.5em; }
        body.is-nav-open .langButton,
        body.is-nav-open .chatButton,
        body.is-nav-open .corner,
        body.is-nav-open .corner2 { opacity: 0; pointer-events: none; }
        body.is-nav-open .logo { z-index: 130; mix-blend-mode: normal; }
      }

      @media (max-width: 560px) {
        body {
          --corner-final-offset: 20px;
          --corner-left-offset: 12px;
          --corner-bottom-offset: 12px;
          --logo-final-top-offset: 0.3214em;
          --logo-final-left-offset: 0.2857em;
        }
        body .logo {
          font-size: 3.5em;
          top: calc(var(--logo-final-top-offset) + var(--app-safe-top, 0px));
          left: calc(var(--logo-final-left-offset) + var(--app-safe-left, 0px));
        }
        .menuButton {
          top: calc(1.05em + var(--app-safe-top, 0px)) !important;
          right: calc(1.05em + var(--app-safe-right, 0px)) !important;
        }
        body .langButton { font-size: 0.9em; }
        body .chatButton {
          bottom: calc(1em + var(--app-fixed-bottom-clearance, 0px));
          right: calc(1em + var(--app-safe-right, 0px));
        }
        body .navBar {
          padding: calc(6.25em + var(--app-safe-top, 0px)) calc(2.5em + var(--app-safe-right, 0px)) calc(2.5em + var(--app-fixed-bottom-clearance, 0px)) calc(2.5em + var(--app-safe-left, 0px));
        }
        body .navBar a { font-size: 3em; }
        body[data-lang="ka"] .navBar a { font-size: 2.7em; }
      }

      /* ===== KEYFRAME ANIMATIONS ===== */
      @keyframes footerTextWave {
        0% { opacity: 0.22; } 35% { opacity: 1; } 100% { opacity: 0.22; }
      }
      @keyframes starsFieldLoop {
        0% { transform: translate3d(6%, 3.2%, 0) scale(1.04); opacity: 0.56; }
        25% { transform: translate3d(2.4%, 1.4%, 0) scale(1.09); opacity: 0.66; }
        50% { transform: translate3d(0, 0, 0) scale(1.13); opacity: 0.7; }
        75% { transform: translate3d(-2.4%, -1.4%, 0) scale(1.17); opacity: 0.62; }
        100% { transform: translate3d(-6%, -3.2%, 0) scale(1.21); opacity: 0.56; }
      }
      @keyframes starsIntroSharp {
        0% { opacity: 0.12; transform: translate3d(0, 1.7%, 0) scale(0.42); }
        32% { opacity: 0.72; transform: translate3d(0.8%, 0.9%, 0) scale(0.86); }
        64% { opacity: 0.42; transform: translate3d(1.9%, 0.2%, 0) scale(1.1); }
        100% { opacity: 0.56; transform: translate3d(6%, 3.2%, 0) scale(1.04); }
      }
      @keyframes starsIntroDrift {
        0% { opacity: 0.22; transform: translate3d(-2vw, -1.4vh, 0) scale(1.14); }
        24% { opacity: 0.34; transform: translate3d(-1vw, -0.8vh, 0) scale(1.115); }
        54% { opacity: 0.29; transform: translate3d(0.25vw, 0.15vh, 0) scale(1.08); }
        78% { opacity: 0.24; transform: translate3d(1.4vw, 0.95vh, 0) scale(1.05); }
        100% { opacity: 0; transform: translate3d(2.7vw, 2.05vh, 0) scale(1.01); }
      }
      @keyframes starsIntroScale {
        0% { opacity: 0.16; transform: translate3d(0, 1.55vh, 0) scale(0.42); }
        22% { opacity: 0.7; transform: translate3d(0, 1vh, 0) scale(0.63); }
        48% { opacity: 0.56; transform: translate3d(0, 0.45vh, 0) scale(0.88); }
        74% { opacity: 0.34; transform: translate3d(0, -0.05vh, 0) scale(1.08); }
        100% { opacity: 0; transform: translate3d(0, -0.45vh, 0) scale(1.22); }
      }
      @keyframes rotateGlobe {
        from { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) scale(1.015); }
        50% { transform: rotate(180deg) scale(1.03); }
        75% { transform: rotate(270deg) scale(1.015); }
        to { transform: rotate(360deg) scale(1); }
      }
      @keyframes bannerTitleWave {
        0% { opacity: 0.22; } 35% { opacity: 1; } 100% { opacity: 0.22; }
      }
      @keyframes bannerTitleIn {
        0% { opacity: 0; transform: translateY(0.4em); filter: blur(6px); }
        100% { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      @keyframes bannerSubtitleIn {
        0% { opacity: 0; transform: translateY(0.4em); filter: blur(6px); }
        100% { opacity: 0.4; transform: translateY(0); filter: blur(0); }
      }
      @keyframes logoDotPulse {
        0% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.5; }
      }
      @keyframes logoPulseStrong {
        0% { transform: translate(-50%, -50%) scale(0.94); opacity: 0.6; }
        60% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      }
      @keyframes logoMove {
        0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); }
        70% { top: calc(var(--logo-final-top-offset, 0.5em) + var(--app-safe-top, 0px)); left: calc(var(--logo-final-left-offset, 0.5em) + var(--app-safe-left, 0px)); transform: translate(0, 0) scale(1.02); }
        100% { top: calc(var(--logo-final-top-offset, 0.5em) + var(--app-safe-top, 0px)); left: calc(var(--logo-final-left-offset, 0.5em) + var(--app-safe-left, 0px)); transform: translate(0, 0) scale(1); }
      }
      @keyframes cornerPulseStrongLeft {
        0% { opacity: 0.4; transform: translate(-50%, -50%) translate(-2em, 2em) scale(0.92); }
        60% { opacity: 1; transform: translate(-50%, -50%) translate(-2em, 2em) scale(1.08); }
        100% { opacity: 1; transform: translate(-50%, -50%) translate(-2em, 2em) scale(1); }
      }
      @keyframes cornerPulseStrongRight {
        0% { opacity: 0.4; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(0.92); }
        60% { opacity: 1; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(1.08); }
        100% { opacity: 1; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(1); }
      }
      @keyframes cornerToBottomLeft {
        0% { transform: translate(-50%, -50%) translate(-2em, 2em) rotate(0deg); }
        70% { transform: translate(calc(-50vw + var(--corner-left-offset, var(--corner-final-offset, 20px)) + var(--app-safe-left, 0px)), calc(50vh - var(--corner-bottom-offset, var(--corner-final-offset, 20px)) - var(--app-fixed-bottom-clearance, 0px) - var(--corner-size, 1.2em))) rotate(0deg); }
        100% { transform: translate(calc(-50vw + var(--corner-left-offset, var(--corner-final-offset, 20px)) + var(--app-safe-left, 0px)), calc(50vh - var(--corner-bottom-offset, var(--corner-final-offset, 20px)) - var(--app-fixed-bottom-clearance, 0px) - var(--corner-size, 1.2em))) rotate(0deg); }
      }
      @keyframes cornerToTopRight {

      /* ===== TESTIMONIAL PULSE ===== */

      @keyframes focusFramePulse {
