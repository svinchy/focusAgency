<html background="#000">
  <head>
    <title>Focus Agency - Digital Marketing & Web Development</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta charset="UTF-8" />
    <style>
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Thin.woff2') format('woff2'), url('./FONT/Exo2-Thin.woff') format('woff');
        font-weight: 100; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-ExtraLight.woff2') format('woff2'), url('./FONT/Exo2-ExtraLight.woff') format('woff');
        font-weight: 200; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Light.woff2') format('woff2'), url('./FONT/Exo2-Light.woff') format('woff');
        font-weight: 300; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Regular.woff2') format('woff2'), url('./FONT/Exo2-Regular.woff') format('woff');
        font-weight: 400; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Medium.woff2') format('woff2'), url('./FONT/Exo2-Medium.woff') format('woff');
        font-weight: 500; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-SemiBold.woff2') format('woff2'), url('./FONT/Exo2-SemiBold.woff') format('woff');
        font-weight: 600; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Bold.woff2') format('woff2'), url('./FONT/Exo2-Bold.woff') format('woff');
        font-weight: 700; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-ExtraBold.woff2') format('woff2');
        font-weight: 800; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'Exo 2';
        src: url('./FONT/Exo2-Black.woff2') format('woff2'), url('./FONT/Exo2-Black.woff') format('woff');
        font-weight: 900; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'BPG Square Banner Caps 2013';
        src: url('./FONT/bpg-square-banner-caps-2013-webfont.woff2') format('woff2'),
             url('./FONT/bpg-square-banner-caps-2013-webfont.woff') format('woff'),
             url('./FONT/bpg-square-banner-caps-2013-webfont.ttf') format('truetype');
        font-weight: 400; font-style: normal; font-display: swap;
      }
      @font-face {
        font-family: 'BPG Square Banner 2013';
        src: url('./FONT/bpg-square-banner-2013-webfont.woff2') format('woff2'),
             url('./FONT/bpg-square-banner-2013-webfont.woff') format('woff'),
             url('./FONT/bpg-square-banner-2013-webfont.ttf') format('truetype');
        font-weight: 400; font-style: normal; font-display: swap;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        color: rgba(255, 241, 227, 1);
        font-family: 'Exo 2', sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      * { box-sizing: border-box; }
      *::before, *::after { box-sizing: inherit; }
      /* Pseudo-elements need content to render - DOMQL doesn't set it automatically */
      [class*="smbls-"]::before, [class*="smbls-"]::after { content: ''; }

      @keyframes footerTextWave {
        0% { opacity: 0.22; }
        35% { opacity: 1; }
        100% { opacity: 0.22; }
      }

      /* Stars & Globe animations */
      @keyframes starsDrift {
        0% { background-position: 50% 50%; }
        50% { background-position: 52% 48%; }
        100% { background-position: 50% 50%; }
      }
      @keyframes starsIntroDrift {
        0% { opacity: 0.22; transform: translate3d(-2vw, -1.4vh, 0) scale(1.14); }
        24% { opacity: 0.34; transform: translate3d(-1vw, -0.8vh, 0) scale(1.115); }
        54% { opacity: 0.29; transform: translate3d(0.25vw, 0.15vh, 0) scale(1.08); }
        78% { opacity: 0.24; transform: translate3d(1.4vw, 0.95vh, 0) scale(1.05); }
        100% { opacity: 0; transform: translate3d(2.7vw, 2.05vh, 0) scale(1.01); }
      }
      @keyframes starsIntroScale {
        0% { opacity: 0.16; transform: translate3d(0, 1.55vh, 0) scale(0.42); }
        22% { opacity: 0.7; transform: translate3d(0, 1vh, 0) scale(0.63); }
        48% { opacity: 0.56; transform: translate3d(0, 0.45vh, 0) scale(0.88); }
        74% { opacity: 0.34; transform: translate3d(0, -0.05vh, 0) scale(1.08); }
        100% { opacity: 0; transform: translate3d(0, -0.45vh, 0) scale(1.22); }
      }
      @keyframes starsTwinkle {
        0%, 100% { opacity: 0.25; }
        50% { opacity: 0.6; }
      }
      @keyframes rotateGlobe {
        from { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) scale(1.015); }
        50% { transform: rotate(180deg) scale(1.03); }
        75% { transform: rotate(270deg) scale(1.015); }
        to { transform: rotate(360deg) scale(1); }
      }

      /* Stars intro burst - active during intro */
      .intro-active:not(.intro-finished) [data-el="stars-bg"]::before {
        animation: starsIntroDrift 3.05s cubic-bezier(0.33, 1, 0.68, 1) both !important;
      }
      .intro-active:not(.intro-finished) [data-el="stars-bg"]::after {
        animation: starsIntroScale 3.05s cubic-bezier(0.33, 1, 0.68, 1) both !important;
      }
      .intro-finished [data-el="stars-bg"] {
        display: none;
      }

      /* Banner title wave animation */
      @keyframes bannerTitleWave {
        0% { opacity: 0.22; }
        35% { opacity: 1; }
        100% { opacity: 0.22; }
      }
      [data-wave-active] .wave-char {
        display: inline-block;
        opacity: 0.25;
        transition: opacity 0.25s ease;
        animation: bannerTitleWave 2.4s linear infinite;
        animation-delay: calc(var(--char-index) * 0.035s);
      }
      .wave-word { display: inline-block; white-space: nowrap; }

      /* Section title scroll reveal */
      [data-reveal] {
        opacity: 0;
        transform: translateY(0.4em);
        filter: blur(4px);
        transition: opacity 0.8s ease, transform 0.8s ease, filter 0.8s ease;
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }

      /* Footer text wave */
      .wave-char-footer {
        display: inline-block;
        opacity: 0.25;
        transition: opacity 0.25s ease;
      }
      [data-wave-active] .wave-char-footer {
        animation: footerTextWave 2.4s linear infinite;
        animation-delay: calc(var(--char-index) * 0.035s);
      }

      /* Intro overlay gradients */
      .intro-overlay-left,
      .intro-overlay-right {
        position: fixed;
        inset: 0;
        z-index: 1500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1s ease;
      }
      .intro-overlay-left { background: linear-gradient(to right, #000 0%, rgba(0,0,0,0) 100%); }
      .intro-overlay-right { background: linear-gradient(to left, #000 0%, rgba(0,0,0,0) 100%); }
      .intro-overlay-show .intro-overlay-left,
      .intro-overlay-show .intro-overlay-right { opacity: 1; }
      .intro-overlay-fade .intro-overlay-left,
      .intro-overlay-fade .intro-overlay-right { opacity: 0; }

      /* Pre-intro defaults: position elements before JS runs (prevents flash) */
      [data-intro-logo] {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: 1600 !important;
        color: transparent !important;
        transition: none !important;
      }
      [data-intro-corner] {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        right: auto !important;
        bottom: auto !important;
        transform: translate(-50%, -50%) !important;
        z-index: 1600 !important;
        opacity: 0 !important;
        transition: opacity 0.6s ease !important;
      }
      [data-intro-banner-h1],
      [data-intro-banner-h4] {
        opacity: 0 !important;
        transform: translateY(0.4em);
        filter: blur(6px);
      }

      /* Intro logo states */
      .intro-active [data-intro-logo]::after {
        animation: logoDotPulse 1s ease-in-out infinite;
      }
      .intro-reveal [data-intro-logo] {
        color: rgba(255, 241, 227, 1) !important;
        animation: logoPulseStrong 0.9s ease-out 1 both;
      }
      .intro-corners-move [data-intro-logo] {
        animation: logoMove 2.8s cubic-bezier(0.16, 1, 0.3, 1) both !important;
      }

      /* Intro corner states */
      .intro-corners [data-intro-corner] { opacity: 1 !important; }
      .intro-corners [data-intro-corner="1"] {
        transform: translate(-50%, -50%) translate(-2em, 2em) !important;
        animation: cornerPulseStrongLeft 0.9s ease-out 1 both;
      }
      .intro-corners [data-intro-corner="2"] {
        transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) !important;
        animation: cornerPulseStrongRight 0.9s ease-out 1 both;
      }
      .intro-corners-move [data-intro-corner="1"] {
        animation: cornerToBottomLeft 3s cubic-bezier(0.16, 1, 0.3, 1) both !important;
      }
      .intro-corners-move [data-intro-corner="2"] {
        animation: cornerToTopRight 3s cubic-bezier(0.16, 1, 0.3, 1) both !important;
      }

      /* Banner title intro */
      .intro-banner [data-intro-banner-h4] {
        animation: bannerSubtitleIn 1.1s ease forwards;
      }
      .intro-banner [data-intro-banner-h1] {
        animation: bannerTitleIn 1.4s ease forwards;
        animation-delay: 0.4s;
      }
      .intro-finished [data-intro-banner-h1],
      .intro-finished [data-intro-banner-h4] {
        opacity: 1 !important;
        transform: translateY(0) !important;
        filter: blur(0) !important;
        animation: none !important;
      }

      /* Intro body scroll lock */
      .intro-active { overflow: hidden !important; }

      @keyframes logoDotPulse {
        0% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.5; }
      }
      @keyframes logoPulseStrong {
        0% { transform: translate(-50%, -50%) scale(0.94); opacity: 0.6; }
        60% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      }
      @keyframes cornerPulseStrongLeft {
        0% { opacity: 0.4; transform: translate(-50%, -50%) translate(-2em, 2em) scale(0.92); }
        60% { opacity: 1; transform: translate(-50%, -50%) translate(-2em, 2em) scale(1.08); }
        100% { opacity: 1; transform: translate(-50%, -50%) translate(-2em, 2em) scale(1); }
      }
      @keyframes cornerPulseStrongRight {
        0% { opacity: 0.4; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(0.92); }
        60% { opacity: 1; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(1.08); }
        100% { opacity: 1; transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg) scale(1); }
      }
      @keyframes logoMove {
        0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); }
        70% { top: 0.5em; left: 0.5em; transform: translate(0, 0) scale(1.02); }
        100% { top: 0.5em; left: 0.5em; transform: translate(0, 0) scale(1); }
      }
      @keyframes cornerToBottomLeft {
        0% { transform: translate(-50%, -50%) translate(-2em, 2em) rotate(0deg); }
        70% { transform: translate(calc(-50% - 50vw + (var(--corner-final-offset, 2.5em) - 0.3em)), calc(-50% + 50vh - (var(--corner-final-offset, 2.5em) - 0.3em))) rotate(0deg); }
        100% { transform: translate(calc(-50% - 50vw + (var(--corner-final-offset, 2.5em) - 0.3em)), calc(-50% + 50vh - (var(--corner-final-offset, 2.5em) - 0.3em))) rotate(0deg); }
      }
      @keyframes cornerToTopRight {
        0% { transform: translate(-50%, -50%) translate(2em, -2em) rotate(180deg); }
        70% { transform: translate(calc(-50% + 50vw - (var(--corner-final-offset, 2.5em) - 0.3em)), calc(-50% - 50vh + (var(--corner-final-offset, 2.5em) - 0.3em))) rotate(180deg); }
        100% { transform: translate(calc(-50% + 50vw - (var(--corner-final-offset, 2.5em) - 0.3em)), calc(-50% - 50vh + (var(--corner-final-offset, 2.5em) - 0.3em))) rotate(180deg); }
      }
      @keyframes bannerTitleIn {
        0% { opacity: 0; transform: translateY(0.4em); filter: blur(6px); }
        100% { opacity: 1; transform: translateY(0); filter: blur(0); }
      }
      @keyframes bannerSubtitleIn {
        0% { opacity: 0; transform: translateY(0.4em); filter: blur(6px); }
        100% { opacity: 0.4; transform: translateY(0); filter: blur(0); }
      }

      @media (max-width: 560px) {
        @keyframes logoMove {
          0% { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); }
          70% { top: 0.2em; left: 0.2em; transform: translate(0, 0) scale(1.02); }
          100% { top: 0.2em; left: 0.2em; transform: translate(0, 0) scale(1); }
        }
      }

      /* Corner2 fade on tablet (matches HTML-CSS @media max-width:1180px) */
      @media (max-width: 1180px) {
        .intro-corners-move [data-intro-corner="2"] {
          animation:
            cornerToTopRight 3s cubic-bezier(0.16, 1, 0.3, 1) both,
            corner2FadeNearEnd 3s ease both !important;
        }
        @keyframes corner2FadeNearEnd {
          0% { opacity: 1; }
          70% { opacity: 0; }
          88% { opacity: 0; }
          100% { opacity: 0; }
        }
        .intro-finished [data-intro-corner="2"] {
          opacity: 0 !important;
          pointer-events: none;
        }
      }

      /* Testimonial pulse animations */
      @keyframes messagePeakPulse {
        0% { filter: drop-shadow(0 0 0 rgba(255, 241, 227, 0)); text-shadow: 0 0 0 rgba(255, 241, 227, 0); }
        45% { filter: drop-shadow(0 0 1.2em rgba(255, 241, 227, 0.75)); text-shadow: 0 0 0.9em rgba(255, 241, 227, 0.6); }
        100% { filter: drop-shadow(0 0 0 rgba(255, 241, 227, 0)); text-shadow: 0 0 0 rgba(255, 241, 227, 0); }
      }
      @keyframes focusFramePulse {
        0% { transform: translate(-50%, -50%) scale(1); }
        45% { transform: translate(-50%, -50%) scale(0.988); }
        100% { transform: translate(-50%, -50%) scale(1); }
      }
      @keyframes focusRingPulse {
        0% { opacity: 0; transform: scale(0.94); }
        40% { opacity: 0.85; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.08); }
      }
      @keyframes focusCornerFlash {
        0% { opacity: 1; filter: drop-shadow(0 0 0 rgba(224, 77, 77, 0)); background: #e04d4d; }
        40% { opacity: 1; filter: drop-shadow(0 0 0.55em rgba(224, 77, 77, 0.9)); background: rgba(255, 129, 129, 1); }
        100% { opacity: 1; filter: drop-shadow(0 0 0 rgba(224, 77, 77, 0)); background: #e04d4d; }
      }
      @keyframes focusNamePulse {
        0% { opacity: 1; transform: translateY(0) scale(1); text-shadow: 0 0 0 rgba(255, 241, 227, 0); }
        45% { opacity: 1; transform: translateY(0) scale(1.02); text-shadow: 0 0 0.65em rgba(255, 241, 227, 0.45); }
        100% { opacity: 1; transform: translateY(0) scale(1); text-shadow: 0 0 0 rgba(255, 241, 227, 0); }
      }
      @keyframes quoteShake {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        20% { transform: translate(0.04em, -0.03em) rotate(-0.55deg); }
        45% { transform: translate(-0.032em, 0.024em) rotate(0.45deg); }
        70% { transform: translate(0.024em, -0.018em) rotate(-0.35deg); }
        85% { transform: translate(-0.016em, 0.012em) rotate(0.25deg); }
      }

      /* Feedbacks pulse classes */
      .is-pulse-frame { animation: focusFramePulse 0.52s ease-out; }
      .is-pulse-frame::after { animation: focusRingPulse 0.52s ease-out !important; }
      .is-pulse-name { animation: focusNamePulse 0.52s ease-out; }
      .is-pulse-msg { animation: messagePeakPulse 0.38s ease-out; }
      .is-pulse-corner::before,
      .is-pulse-corner::after { animation: focusCornerFlash 0.52s ease-out !important; }

      /* Focus frame border ring (::after pseudo-element) */
      [data-el="focus-frame"]::after {
        content: '';
        position: absolute;
        inset: -0.7em;
        border: 1px solid rgba(224, 77, 77, 0.45);
        border-radius: 0.2em;
        opacity: 0;
        pointer-events: none;
      }

      /* Quote shake on scroll */
      .is-scrolling [data-el="quote-img"] {
        animation: quoteShake 1.8s cubic-bezier(0.2, 0, 0, 1) infinite;
      }

      /* Team scroll reveal (matches HTML-CSS team section reveal) */
      .team-reveal {
        opacity: 0;
        transform: translateX(var(--swim-x, 0em)) translateY(calc(1.2em + var(--swim-y, 0em))) rotate(var(--swim-r, 0deg));
        transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1);
      }
      .team-reveal.is-visible {
        opacity: 1;
        transform: translateX(var(--swim-x, 0em)) translateY(var(--swim-y, 0em)) rotate(var(--swim-r, 0deg));
      }
      .team-reveal-delay {
        transition-delay: 0.1s;
      }

      /* Service card specular highlight (::before) */
      [data-el="service-card"]::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: radial-gradient(120% 120% at 20% 0%, rgba(255, 255, 255, 0.5), transparent 45%);
        opacity: 0;
        transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
        pointer-events: none;
        z-index: 1;
      }
      [data-el="service-card"]:hover::before {
        opacity: 0.6;
      }
      /* Service card gradient overlay (::after) */
      [data-el="service-card"]::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
        z-index: 4;
        transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1);
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.94) 0%, rgba(0, 0, 0, 0.72) 1.5em, rgba(0, 0, 0, 0.36) 4.2em, rgba(0, 0, 0, 0) 8.2em),
          linear-gradient(to top, rgba(0, 0, 0, 0.96) 0%, rgba(0, 0, 0, 0.76) 1.8em, rgba(0, 0, 0, 0.42) 4.8em, rgba(0, 0, 0, 0) 9.2em);
      }
      [data-el="service-card"].card-active::after {
        opacity: 1;
      }
      /* Active card hover is different from collapsed hover */
      [data-el="service-card"].card-active:hover {
        transform: perspective(1000px) translateY(2px) rotateX(-2deg) rotateY(2deg) !important;
      }

      @media (max-width: 1180px) {
        .intro-corners-move [data-intro-corner="2"] {
          animation: cornerToTopRight 3s cubic-bezier(0.16, 1, 0.3, 1) both,
                     corner2FadeNearEnd 3s ease both !important;
        }
        @keyframes corner2FadeNearEnd {
          0% { opacity: 1; }
          70% { opacity: 0; }
          88% { opacity: 0; }
          100% { opacity: 0; }
        }
        .intro-finished [data-intro-corner="2"] {
          opacity: 0 !important;
          pointer-events: none;
        }
      }
      /* ===== FORM STYLING ===== */
      form {
        display: flex;
        flex-flow: column;
        max-width: fit-content;
        max-height: fit-content;
        position: relative;
        gap: 1em;
      }
      legend {
        font-size: 1.2em;
        color: rgba(255, 241, 227, 0.7);
        margin: 0 0 2em 0.5em;
        font-weight: 300;
      }
      input {
        border: 1px solid rgba(255, 241, 227, 0.1) !important;
        font-size: 1em;
        border-radius: 2em;
        padding: 1em 1.5em;
        color: rgba(255, 241, 227, 1);
        background: transparent;
        font-family: 'Exo 2', sans-serif;
      }
      input::placeholder {
        color: rgba(255, 241, 227, 0.3);
      }
      textarea {
        padding: 1.2em 1.5em;
        border: 1px solid rgba(255, 241, 227, 0.1) !important;
        border-radius: 2em;
        resize: none;
        background: transparent;
        color: rgba(255, 241, 227, 1);
        font-family: 'Exo 2', sans-serif;
      }
      textarea::placeholder {
        color: rgba(255, 241, 227, 0.3);
      }
      input:focus, textarea:focus {
        outline: none;
      }
      [data-section="contact"] button {
        width: fit-content;
        padding: 0.75em 1.5em;
        border: none !important;
        background: rgba(224, 77, 77, 0.75) !important;
        color: #fff;
        font-size: 1.1em;
        border-radius: 3em;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: background 0.5s ease, transform 0.5s ease;
        font-family: 'Exo 2', sans-serif;
      }
      [data-section="contact"] button:hover {
        background: rgba(224, 77, 77, 1) !important;
        transform: scale(1.05);
      }
      [data-section="contact"] button:focus {
        outline: none;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./index.js"></script>
  </body>
</html>
